<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشفر إعلانات ديسكورد</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h3>🛡️ مشفر إعلانات 7amo</h3>
        <p>تشفير 100% لتجنب الحذف والباند</p>
    </div>

    <div class="container">
        <textarea id="inputText" placeholder="ضع إعلانك هنا (روابط، كلمات محظورة)..."></textarea>
        
        <div class="buttons">
            <button onclick="encrypt()">تشفير الإعلان 🔒</button>
            <button onclick="copyResult()" style="background: #2ecc71;">نسخ المشفر 📋</button>
        </div>

        <div id="status"></div>
        <div id="outputText" class="result-box">النتيجة ستظهر هنا...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
